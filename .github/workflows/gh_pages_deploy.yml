name: Deploy to GitHub Pages

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web (WASM)
        run: flutter build web --wasm

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.SECRET_FOR_DEPLOY_OBS_MANAGER }}
          branch: gh-pages
          folder: build/web
